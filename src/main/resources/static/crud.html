<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="style.css">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,500;1,500&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
		<title>Sistema de produtos</title>
	</head>
		
	<body>
		<div class="content">
			<div class="cadastro">
				<h1>Cadastro de produtos</h1>
				<div class="form">
					<label for="id">ID: </label>
					<input type="text" id="id">
				
					<label for="nome">Nome: </label>
					<input type="text" id="nome">
				
					<label for="preco">Preço: </label>
					<input type="text" id="preco">		
				
					<label for="quantidade">Quantidade: </label>
					<input type="text" id="quantidade">
				
					<label for="status">Status: </label>
					<input type="text" id="status">
				</div>

				<div class="botoes">
					<button onclick="salvar()" class="botao-salvar">Salvar</button>
					<button onclick="atualizar()" class="botao-atualizar">Atualizar</button>
					<button onclick="deletar()" class="botao-deletar">Deletar</button>
					<button onclick="carregarCampos()" class="botao-consultar">Consultar</button>
					<button onclick="limparCampos()" class="botao-limpar">Limpar campos</button>
				</div>

			</div>
			
			<div class="lista">
				<h1>Lista de produtos</h1>
				<table>
					<thead>
						<tr>
							<th>ID</th>
							<th>Nome</th>
							<th>Preço</th>
							<th>Quantidade</th>
							<th>Status</th>
						</tr>
					</thead>
					<tbody id="lista-produtos"></tbody>
				</table>
				
				<p id="total-produtos"></p>
			</div>
			
			<script>
				
				const BASE_URL = 'http://localhost:8080/produtos';
				
				//função que coleta dados do formulário
				function getProdutoFromForm() {
					const nome = document.getElementById('nome').value;
					const preco = document.getElementById('preco').value;
					const quantidade = document.getElementById('quantidade').value;
					const status = document.getElementById('status').value;
					return {nome, preco: parseFloat(preco), quantidade: parseInt(quantidade), status}
				}
				
				async function listarTodos() { //async permite usar await dentro da função
					const response = await fetch(BASE_URL); //o fetch vai na base de dados buscar eles e vai guardar no response
					const produtos = await response.json(); //o await espera todos os dados virem para o programa continuar. Aqui ele transforma a resposta em json
					const lista = document.getElementById('lista-produtos'); //tudo o que eu mexer na lista vai aparecer la na ul
					const total = document.getElementById('total-produtos'); //mesma coisa aqui, isso se chama passagem por referência
					lista.innerHTML = ''; //limpa a lista, porque se chamar de novo ele adiciona o conteúdo novamente
					produtos.forEach(produto => {
						const linha = document.createElement('tr');
						linha.innerHTML = `
							<td>${produto.id}</td>
							<td>${produto.nome}</td>
							<td>R$${produto.preco}</td>
							<td>${produto.quantidade}</td>
							<td>${produto.status}</td>
						`;
						
							lista.appendChild(linha);
					});

					total.textContent = `Total de produtos: ${produtos.length}`;				
				} 
				
				function limparCampos() {
					document.getElementById('id').value = ' ';
					document.getElementById('nome').value = ' ';
					document.getElementById('preco').value = ' ';
					document.getElementById('quantidade').value = ' ';
					document.getElementById('status').value = ' ';
				}
				
				async function salvar() {
					const produto = getProdutoFromForm();
					await fetch(BASE_URL, {
						method: 'POST',
						headers: {'Content-Type': 'application/json'}, 
						body: JSON.stringify(produto)
					});
					listarTodos();
					limparCampos();
				}
				
				async function atualizar() {
					const produto = getProdutoFromForm();
					const id = document.getElementById('id').value;
					await fetch(`${BASE_URL}/${id}`, {
						method: 'PUT',
						headers: {'Content-Type': 'application/json'},
						body: JSON.stringify(produto)
					});
					listarTodos();
					limparCampos();
				}
				
				async function deletar() {
					const id = document.getElementById('id').value;
					await fetch(`${BASE_URL}/${id}`, {method: 'DELETE'});
					listarTodos();
					limparCampos();
				}
				
				function carregarCampos() {
					const id = document.getElementById('id').value;
					fetch(`${BASE_URL}/${id}`).then(response => response.json()).then(produto => {
						document.getElementById('nome').value = produto.nome;
						document.getElementById('preco').value = produto.preco;
						document.getElementById('quantidade').value = produto.quantidade;
						document.getElementById('status').value = produto.status;
					})
					.catch(error => {
						console.error('Erro ao consultar produtos: '+error)
					});
				}
				
				document.addEventListener('DOMContentLoaded', listarTodos);
				
			</script>
		</div>
	</body>
</html>
